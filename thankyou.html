<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= ROOT ================= */
:root{
    --dark:#2a001f;
    --pink:#ff4fa3;
    --lightpink:#ff8cc6;
    --hotpink:#ff2e88;
    --soft:#ffe6f2;
}

/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Fredoka', sans-serif;
    background: linear-gradient(135deg,#2a001f,#3b0a2f,#5a0033);
    color:var(--soft);
    overflow-x:hidden;
}

/* ================= HEADER ================= */
header{
    background:#2a001f;
    padding:30px 20px 10px;
    border-bottom:2px solid var(--lightpink);
    text-align:center;
    position:relative;
    z-index:2;
}

header h1{
    font-family:'Orbitron';
    color:var(--lightpink);
    text-shadow:0 0 10px var(--hotpink);
}

/* ================= NAV ================= */
nav{margin-top:15px;}

.nav-btn{
    position: relative;
    display:inline-block;
    margin:6px;
    padding:10px 18px;
    background:linear-gradient(135deg,#ff4fa3,#ff2e88,#ff77b7);
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-family:'Orbitron';
    font-size:14px;
    transition:.3s;
    box-shadow:0 0 10px var(--lightpink);
    overflow:hidden;
}

.nav-btn::after{
    content:'';
    position:absolute;
    top:0;
    left:-150%;
    width:60%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
    transform:skewX(-25deg);
    animation:shine 2.5s infinite;
}

@keyframes shine{
    0%{left:-150%;}
    50%{left:150%;}
    100%{left:150%;}
}

.nav-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px var(--hotpink);
    background:#1a0014;
    color:var(--lightpink);
}

/* ================= MAIN ================= */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:80px auto;
    gap:20px;
    position:relative;
    z-index:2;
}

/* BIG IMAGE */
.thank-img{
    width:80%;
    max-width:500px;
    border-radius:20px;
    box-shadow:0 0 25px var(--pink);
    transition:.3s;
}

.thank-img:hover{
    transform:scale(1.03);
    box-shadow:0 0 40px var(--hotpink);
}

/* TEXT */
.message{
    font-size:20px;
    color:var(--lightpink);
    text-align:center;
}

/* ================= STAR EFFECT ================= */
.star{
    position:fixed;
    width:2px;
    height:2px;
    background:var(--lightpink);
    border-radius:50%;
    opacity:0.7;
    animation:twinkle 2s infinite alternate;
    z-index:1;
}

@keyframes twinkle{
    0%{transform:scale(1);opacity:0.3;}
    50%{transform:scale(1.5);opacity:1;}
    100%{transform:scale(1);opacity:0.3;}
}

</style>
</head>

<body>

<!-- STAR SCRIPT -->
<script>
for(let i=0;i<80;i++){
    let star=document.createElement('div');
    star.className='star';
    star.style.top=Math.random()*100+'vh';
    star.style.left=Math.random()*100+'vw';
    star.style.width=star.style.height=(Math.random()*3+1)+'px';
    star.style.animationDuration=(Math.random()*2+1)+'s';
    document.body.appendChild(star);
}
</script>

<header>
    <h1>Thank You 💗</h1>

    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="about.html" class="nav-btn">About Me</a>
        <a href="contacts.html" class="nav-btn">Contacts</a>
        <a href="goals.html" class="nav-btn">My Goals</a>
        <a href="envi.html" class="nav-btn">My Environment</a>
        <a href="future.html" class="nav-btn">My Future Me</a>
        <a href="street.html" class="nav-btn">Street Photography</a>
        <a href="brand.html" class="nav-btn">My Brand, My Logo</a>
        <a href="thankyou.html" class="nav-btn">Thank You</a>
    </nav>
</header>

<div class="container">

    <img src="ty.jpeg" class="thank-img">

</div>

</body>
</html>
